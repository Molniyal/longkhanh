<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Khởi động hệ thống PCCC...</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f2f5; color: #555; }
    .loader {
      border: 4px solid #f3f3f3; border-top: 4px solid #1a237e;
      border-radius: 50%; width: 40px; height: 40px;
      animation: spin 1s linear infinite; margin: 0 auto 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
  <script>
    window.onload = function() {
      const params = new URLSearchParams(window.location.search);
      const deviceCode = params.get('device');
      
      if (deviceCode) {
        const prefix = deviceCode.split('-')[0].toUpperCase();
        switch (prefix) {
          case 'BCC':
            window.location.href = 'Form_BCC.html?device=' + encodeURIComponent(deviceCode);
            break;
          case 'TCC':
            window.location.href = 'Form_TCC.html?device=' + encodeURIComponent(deviceCode);
            break;
          case 'DET':
            window.location.href = 'Form_DenExit.html?device=' + encodeURIComponent(deviceCode);
            break;
          case 'DCS':
            window.location.href = 'Form_DenChieuSang.html?device=' + encodeURIComponent(deviceCode);
            break;
          default:
            alert('Mã thiết bị không hợp lệ: ' + deviceCode);
            window.location.href = 'Login.html';
        }
      } else {
        const session = localStorage.getItem('pccc_session');
        if (session) {
          try {
            const user = JSON.parse(session);
            if (user.vaiTro === 'Admin' || user.vaiTro === 'HSE') {
              window.location.href = 'Admin.html';
            } else {
              window.location.href = 'Login.html';
            }
          } catch(err) {
            window.location.href = 'Login.html';
          }
        } else {
          window.location.href = 'Login.html';
        }
      }
    };
  </script>
</head>
<body>
  <div class="loader"></div>
  <p>Đang chuyển hướng, vui lòng đợi...</p>
</body>
</html>
