<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Đang chuyển hướng...</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0; padding: 0; height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Outfit', sans-serif;
    background: linear-gradient(135deg, #1a237e 0%, #c62828 100%);
    color: white; overflow: hidden;
  }
  .loader-container {
    background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 32px;
    padding: 40px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }
  .dna-spinner {
    width: 60px; height: 60px; border-radius: 50%;
    border: 6px solid transparent; border-top-color: #fff;
    animation: spin 1s linear infinite; margin-bottom: 24px;
    display: inline-block;
  }
  h2 { font-weight: 800; font-size: 18px; letter-spacing: 1px; margin: 0; }
  p { font-size: 14px; opacity: 0.7; margin-top: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="loader-container">
    <div class="dna-spinner"></div>
    <h2>VUI LÒNG ĐỢI</h2>
    <p>Đang kiểm tra thông tin thiết bị...</p>
  </div>

  <script>
    window.onload = function() {
      const params = new URLSearchParams(window.location.search);
      const deviceId = params.get('id') || params.get('device');
      
      if (deviceId) {
        const prefix = deviceId.split('-')[0].toUpperCase();
        let target = 'Form_BCC.html';
        if (prefix === 'TCC') target = 'Form_TCC.html';
        else if (prefix === 'DET' || prefix === 'EXIT') target = 'Form_DenExit.html';
        else if (prefix === 'DCS' || prefix === 'LIGHT') target = 'Form_DenChieuSang.html';
        
        window.location.href = target + '?id=' + encodeURIComponent(deviceId);
      } else {
        const user = localStorage.getItem('user');
        if (user) {
          const u = JSON.parse(user);
          if (['Admin', 'HSE'].includes(u.vaiTro)) window.location.href = 'Admin.html';
          else window.location.href = 'Login.html';
        } else {
          window.location.href = 'Login.html';
        }
      }
    };
  </script>
</body>
</html>
